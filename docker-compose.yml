services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=${DB_NAME:-pokyh}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root --password=\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    ports:
      # Host:container port both driven by PORT in .env (defaults to 4000)
      - "${PORT:-4000}:${PORT:-4000}"
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-4000}
    volumes:
      - cloudflared_data:/root/.cloudflared

volumes:
  mysql_data:
  cloudflared_data:
